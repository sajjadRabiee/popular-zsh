<svg xmlns="http://www.w3.org/2000/svg" viewBox="16 16 788 208" role="img" aria-labelledby="popularTitle popularDesc">
  <title id="popularTitle">popular.zsh</title>
  <desc id="popularDesc">Bookmark, template, and run zsh commands with optional secret placeholders.</desc>
  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#07080D"/>
      <stop offset="100%" stop-color="#0E1020"/>
    </linearGradient>

    <!-- amber → orange → red — mirrors -grad in style.css -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E8C547"/>
      <stop offset="52%"  stop-color="#E8A047"/>
      <stop offset="100%" stop-color="#E84747"/>
    </linearGradient>

    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E8C547" stop-opacity="0"/>
      <stop offset="12%"  stop-color="#E8C547"/>
      <stop offset="88%"  stop-color="#E84747"/>
      <stop offset="100%" stop-color="#E84747" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E8C547" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#E84747" stop-opacity="0.10"/>
    </linearGradient>

    <radialGradient id="pGlow" cx="50%" cy="44%" r="54%">
      <stop offset="0%"   stop-color="#E8C547" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#E8C547" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlow" cx="70%" cy="55%" r="42%">
      <stop offset="0%"   stop-color="#E8C547" stop-opacity="0.032"/>
      <stop offset="100%" stop-color="#E8C547" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- CRT scanlines -->
    <pattern id="scan" x="0" y="0" width="820" height="4" patternUnits="userSpaceOnUse">
      <rect width="820" height="3" fill="none"/>
      <rect y="3" width="820" height="1" fill="#000000" opacity="0.10"/>
    </pattern>

  </defs>


  <!-- Main card -->
  <rect x="16" y="16" width="788" height="208" rx="12"
        fill="#0C0E18" stroke="#2A2D45" stroke-width="1.5"/>

  <!-- Scanlines over content area -->
  <rect x="17" y="59" width="786" height="163" fill="url(#scan)" opacity="0.5"/>

  <!-- Title bar -->
  <rect x="16" y="16" width="788" height="42" rx="12" fill="#0A0B14"/>
  <rect x="16" y="46" width="788" height="12"          fill="#0A0B14"/>

  <!-- Amber accent line -->
  <rect x="16" y="57.5" width="788" height="1.5" fill="url(#accentBar)"/>

  <!-- Traffic lights — new palette -->
  <circle cx="40" cy="37" r="7" fill="#E84747"/>
  <circle cx="62" cy="37" r="7" fill="#E8C547"/>
  <circle cx="84" cy="37" r="7" fill="#6EE893"/>

  <!-- Title bar label -->
  <text x="410" y="43"
        fill="#7A85B0"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="12" text-anchor="middle" letter-spacing="1">popular.zsh — zsh</text>

  <!-- ── Left zone: big "p" logo ─────────────────────────────────── -->

  <!-- Ghost depth layer -->
  <text x="100" y="160"
        fill="url(#titleGrad)"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="84" font-weight="900" text-anchor="middle" opacity="0.07">p</text>

  <!-- Glowing "p" -->
  <text x="100" y="160"
        fill="url(#titleGrad)"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="84" font-weight="900" text-anchor="middle"
        filter="url(#glow)">p</text>

  <!-- Vertical separator -->
  <line x1="178" y1="68" x2="178" y2="216" stroke="#222538" stroke-width="1.5"/>

  <!-- ── Right zone ───────────────────────────────────────────────── -->

  <!-- Main title -->
  <text x="202" y="112"
        fill="url(#titleGrad)"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="36" font-weight="700"
        filter="url(#glow)">popular.zsh</text>

  <!-- Subtitle -->
  <text x="202" y="136"
        fill="#A8B4D8"
        font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
        font-size="12.5" letter-spacing="0.5">bookmark  ·  template  ·  run  ·  pcli sub-shell</text>

  <!-- ── Command badges ── -->

  <!-- padd: green -->
  <rect x="202" y="153" width="46" height="22" rx="5" fill="#181B28" stroke="#1A3D2A" stroke-width="1"/>
  <text x="225" y="168" fill="#6EE893"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">padd</text>

  <!-- p: blue -->
  <rect x="253" y="153" width="26" height="22" rx="5" fill="#181B28" stroke="#1A2A4A" stroke-width="1"/>
  <text x="266" y="168" fill="#7AABF7"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">p</text>

  <!-- pls: orange -->
  <rect x="284" y="153" width="34" height="22" rx="5" fill="#181B28" stroke="#3D3010" stroke-width="1"/>
  <text x="301" y="168" fill="#E8A047"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">pls</text>

  <!-- psecret: red -->
  <rect x="323" y="153" width="66" height="22" rx="5" fill="#181B28" stroke="#3D1A24" stroke-width="1"/>
  <text x="356" y="168" fill="#E84747"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">psecret</text>

  <!-- pedit: cyan -->
  <rect x="394" y="153" width="48" height="22" rx="5" fill="#181B28" stroke="#1A2F3A" stroke-width="1"/>
  <text x="418" y="168" fill="#47C5E8"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">pedit</text>

  <!-- pupdate: green -->
  <rect x="447" y="153" width="68" height="22" rx="5" fill="#181B28" stroke="#1A3D2A" stroke-width="1"/>
  <text x="481" y="168" fill="#6EE893"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">pupdate</text>

  <!-- pcli: purple accent pill -->
  <rect x="520" y="153" width="44" height="22" rx="5" fill="#120E20" stroke="#B07AF7" stroke-width="1.5"/>
  <text x="542" y="168" fill="#B07AF7"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="700" text-anchor="middle">pcli</text>

  <!-- ── Mini terminal ─────────────────────────────────────────────── -->

  <rect x="578" y="72" width="214" height="140" rx="8"
        fill="#05060A" stroke="#181B28" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="578" y="72" width="214" height="22" rx="8" fill="#0A0B14"/>
  <rect x="578" y="84" width="214" height="10"        fill="#0A0B14"/>
  <text x="685" y="87"
        fill="#7A85B0"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="9" text-anchor="middle">zsh</text>

  <!-- padd gs git status -->
  <text x="590" y="111"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="10.5">
    <tspan fill="#7A85B0">$ </tspan>
    <tspan fill="#6EE893">padd</tspan>
    <tspan fill="#E2E8F8"> gs </tspan>
    <tspan fill="#A8B4D8">git status</tspan>
  </text>

  <!-- p gs -->
  <text x="590" y="127"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="10.5">
    <tspan fill="#7A85B0">$ </tspan>
    <tspan fill="#7AABF7">p</tspan>
    <tspan fill="#E2E8F8"> gs</tspan>
  </text>

  <!-- output -->
  <text x="590" y="141"
        fill="#E8A047" opacity="0.85"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="9">On branch main · nothing to commit</text>

  <!-- Divider -->
  <line x1="590" y1="149" x2="780" y2="149" stroke="#1C1F2E" stroke-width="1"/>

  <!-- pcli -->
  <text x="590" y="163"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="10.5">
    <tspan fill="#7A85B0">$ </tspan>
    <tspan fill="#B07AF7">pcli</tspan>
  </text>

  <!-- popular shell -->
  <text x="590" y="177"
        fill="#A8B4D8"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="9">popular shell  ·  [p]</text>

  <!-- hint -->
  <text x="590" y="190"
        fill="#6E78A8"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="8">saved cmds run directly  ·  bye to exit</text>

  <!-- Amber cursor -->
  <rect x="590" y="193" width="6" height="10" rx="1" fill="#E8C547" opacity="0.75"/>

</svg>
