<svg xmlns="http://www.w3.org/2000/svg" viewBox="16 16 788 208" role="img" aria-labelledby="popularTitleL popularDescL">
  <title id="popularTitleL">popular.zsh</title>
  <desc id="popularDescL">Bookmark, template, and run zsh commands with optional secret placeholders.</desc>
  <defs>

    <!-- Sepia/parchment background — mirrors -bg in light mode -->
    <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F2EFE6"/>
      <stop offset="100%" stop-color="#E4E0D4"/>
    </linearGradient>

    <!-- dark amber → dark orange → dark red — mirrors -grad in light mode -->
    <linearGradient id="titleGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="52%"  stop-color="#8A5A0A"/>
      <stop offset="100%" stop-color="#C02828"/>
    </linearGradient>

    <linearGradient id="accentBarL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A" stop-opacity="0"/>
      <stop offset="12%"  stop-color="#B8900A"/>
      <stop offset="88%"  stop-color="#C02828"/>
      <stop offset="100%" stop-color="#C02828" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="borderGradL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#B8900A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C02828" stop-opacity="0.10"/>
    </linearGradient>

    <radialGradient id="pGlowL" cx="50%" cy="44%" r="54%">
      <stop offset="0%"   stop-color="#B8900A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#B8900A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlowL" cx="70%" cy="55%" r="42%">
      <stop offset="0%"   stop-color="#B8900A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#B8900A" stop-opacity="0"/>
    </radialGradient>

    <filter id="glowL" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadowL" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#B8900A" flood-opacity="0.12"/>
    </filter>

  </defs>


  <!-- Main card -->
  <rect x="16" y="16" width="788" height="208" rx="12"
        fill="#FFFFFF" stroke="#D0CCBE" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="16" y="16" width="788" height="42" rx="12" fill="#E8E4D8"/>
  <rect x="16" y="46" width="788" height="12"          fill="#E8E4D8"/>

  <!-- Amber accent line -->
  <rect x="16" y="57.5" width="788" height="1.5" fill="url(#accentBarL)"/>

  <!-- Traffic lights — vivid, same as dark -->
  <circle cx="40" cy="37" r="7" fill="#E84747"/>
  <circle cx="62" cy="37" r="7" fill="#E8C547"/>
  <circle cx="84" cy="37" r="7" fill="#6EE893"/>

  <!-- Title bar label -->
  <text x="410" y="43"
        fill="#AAA590"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="12" text-anchor="middle" letter-spacing="1">popular.zsh — zsh</text>

  <!-- ── Left zone: big "p" logo ─────────────────────────────────── -->

  <!-- Ghost depth layer -->
  <text x="100" y="160"
        fill="url(#titleGradL)"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="84" font-weight="900" text-anchor="middle" opacity="0.06">p</text>

  <!-- Glowing "p" -->
  <text x="100" y="160"
        fill="url(#titleGradL)"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="84" font-weight="900" text-anchor="middle"
        filter="url(#glowL)">p</text>

  <!-- Vertical separator -->
  <line x1="178" y1="68" x2="178" y2="216" stroke="#C8C3B0" stroke-width="1.5"/>

  <!-- ── Right zone ───────────────────────────────────────────────── -->

  <!-- Main title -->
  <text x="202" y="112"
        fill="url(#titleGradL)"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="36" font-weight="700"
        filter="url(#glowL)">popular.zsh</text>

  <!-- Subtitle -->
  <text x="202" y="136"
        fill="#7A7060"
        font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
        font-size="12.5" letter-spacing="0.5">bookmark  ·  template  ·  run  ·  pcli sub-shell</text>

  <!-- ── Command badges ── -->

  <!-- padd: green -->
  <rect x="202" y="153" width="46" height="22" rx="5" fill="#ECEADE" stroke="#B8DCA0" stroke-width="1"/>
  <text x="225" y="168" fill="#2A7A3A"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">padd</text>

  <!-- p: blue -->
  <rect x="253" y="153" width="26" height="22" rx="5" fill="#ECEADE" stroke="#A8C0E0" stroke-width="1"/>
  <text x="266" y="168" fill="#2858A8"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">p</text>

  <!-- pls: orange -->
  <rect x="284" y="153" width="34" height="22" rx="5" fill="#ECEADE" stroke="#E0C890" stroke-width="1"/>
  <text x="301" y="168" fill="#8A5A0A"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">pls</text>

  <!-- psecret: red -->
  <rect x="323" y="153" width="66" height="22" rx="5" fill="#ECEADE" stroke="#F0A8B8" stroke-width="1"/>
  <text x="356" y="168" fill="#C02828"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">psecret</text>

  <!-- pedit: cyan -->
  <rect x="394" y="153" width="48" height="22" rx="5" fill="#ECEADE" stroke="#98CCE0" stroke-width="1"/>
  <text x="418" y="168" fill="#0A7EA8"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">pedit</text>

  <!-- pupdate: green -->
  <rect x="447" y="153" width="68" height="22" rx="5" fill="#ECEADE" stroke="#B8DCA0" stroke-width="1"/>
  <text x="481" y="168" fill="#2A7A3A"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="600" text-anchor="middle">pupdate</text>

  <!-- pcli: purple accent -->
  <rect x="520" y="153" width="44" height="22" rx="5" fill="#EDE8F8" stroke="#6A38C8" stroke-width="1.5"/>
  <text x="542" y="168" fill="#6A38C8"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="11" font-weight="700" text-anchor="middle">pcli</text>

  <!-- ── Mini terminal (sepia) ─────────────────────────────────────── -->

  <rect x="578" y="72" width="214" height="140" rx="8"
        fill="#F0EDE0" stroke="#D0CDB8" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="578" y="72" width="214" height="22" rx="8" fill="#E4E0D0"/>
  <rect x="578" y="84" width="214" height="10"        fill="#E4E0D0"/>
  <text x="685" y="87"
        fill="#AAA590"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="9" text-anchor="middle">zsh</text>

  <!-- padd gs git status -->
  <text x="590" y="111"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="10.5">
    <tspan fill="#C0BBAA">$ </tspan>
    <tspan fill="#2A7A3A">padd</tspan>
    <tspan fill="#1A1710"> gs </tspan>
    <tspan fill="#7A7060">git status</tspan>
  </text>

  <!-- p gs -->
  <text x="590" y="127"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="10.5">
    <tspan fill="#C0BBAA">$ </tspan>
    <tspan fill="#2858A8">p</tspan>
    <tspan fill="#1A1710"> gs</tspan>
  </text>

  <!-- output -->
  <text x="590" y="141"
        fill="#8A5A0A" opacity="0.70"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="9">On branch main · nothing to commit</text>

  <!-- Divider -->
  <line x1="590" y1="149" x2="780" y2="149" stroke="#D0CDB8" stroke-width="1"/>

  <!-- pcli -->
  <text x="590" y="163"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="10.5">
    <tspan fill="#C0BBAA">$ </tspan>
    <tspan fill="#6A38C8">pcli</tspan>
  </text>

  <!-- popular shell -->
  <text x="590" y="177"
        fill="#7A7060"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="9">popular shell  ·  [p]</text>

  <!-- hint -->
  <text x="590" y="190"
        fill="#AAAAAA"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="8">saved cmds run directly  ·  bye to exit</text>

  <!-- Dark amber cursor -->
  <rect x="590" y="193" width="6" height="10" rx="1" fill="#B8900A" opacity="0.70"/>

</svg>
